<html lang="en">
  <head>
    <title>ARIA Table Example</title>
  </head>
  <body>
    <p role="table">
      <b role="row">
        <b role="columnheader">Column 1</b>
        <b role="columnheader">Column 2</b>
      </b>

        <b role="cell">Row 1, Cell 1</b>
        <b role="cell">Row 1, Cell 2</b>
      </b>
    </p>
  </body>
</html>
